<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NequiDz-V3</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #0b0014;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 0;
        }

        /* Contenedor del celular idéntico a tus capturas */
        .phone-container {
            width: 100%;
            max-width: 412px;
            min-height: 100vh;
            background-color: #0b0014;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* --- PANTALLA 1: FORMULARIO MORADO --- */
        .form-panel {
            width: 100%;
            max-width: 360px;
            background-color: #17062c;
            border-radius: 28px;
            padding: 35px 24px;
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.4);
            border: 1px solid #291247;
            display: block;
        }

        .title-main {
            color: #da0075;
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 2px;
            letter-spacing: -0.5px;
        }

        .subtitle-main {
            color: #9283a8;
            font-size: 14px;
            text-align: center;
            margin-bottom: 35px;
        }

        .input-group {
            margin-bottom: 22px;
        }

        .input-group label {
            display: block;
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .input-group input {
            width: 100%;
            background-color: #26123e;
            border: 1px solid #3d235c;
            border-radius: 14px;
            padding: 16px;
            color: #ffffff;
            font-size: 16px;
            outline: none;
        }

        .input-group input::placeholder {
            color: #5b4874;
        }

        /* Botones del Formulario */
        .btn-purple {
            width: 100%;
            background-color: #3e166a;
            color: #ffffff;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 14px;
        }

        .btn-pink {
            width: 100%;
            background-color: #e00073;
            color: #ffffff;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        /* --- PANTALLA 2: COMPROBANTE BLANCO (CALCADO DE TU IMAGEN) --- */
        .receipt-card {
            width: 100%;
            max-width: 365px;
            background-color: #ffffff;
            border-radius: 36px;
            padding: 30px 24px 24px 24px;
            color: #222222;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.5);
            display: none; /* Se activa al generar */
        }

        .check-box {
            text-align: center;
            margin-bottom: 15px;
        }

        .check-circle {
            width: 54px;
            height: 54px;
            background-color: #e3f7ee;
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }

        .check-circle svg {
            width: 26px;
            height: 26px;
            fill: #00b35f;
        }

        .receipt-msg {
            text-align: center;
            font-size: 15px;
            color: #444444;
            font-weight: 400;
            margin-bottom: 4px;
        }

        .receipt-val {
            text-align: center;
            font-size: 36px;
            font-weight: 700;
            color: #111111;
            margin-bottom: 25px;
            letter-spacing: -0.5px;
        }

        .dashed-line {
            border-top: 1px dashed #e0e0e0;
            margin-bottom: 22px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            font-size: 14px;
            line-height: 1.4;
        }

        .info-label {
            color: #7c7c7c;
            width: 35%;
            font-weight: 400;
        }

        .info-value {
            color: #1a1a1a;
            font-weight: 500;
            text-align: right;
            width: 65%;
        }

        /* Botón inferior gris de tu captura */
        .btn-create-other {
            width: 100%;
            background-color: #333333;
            color: #ffffff;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }

        /* Vista previa interna en panel morado */
        .preview-box {
            background-color: #23103c;
            border-left: 4px solid #e00073;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }
        .preview-box p { margin-bottom: 3px; color: #b2a4cb;}
        .preview-box span { color: #ffffff; font-weight: 500; }
    </style>
</head>
<body>

<div class="phone-container">

    <div id="formPanel" class="form-panel">
        <div class="title-main">NequiDz-V3</div>
        <div class="subtitle-main">Comprobante Rápido</div>

        <div class="input-group">
            <label>Número destino</label>
            <input type="number" id="numeroDestino" placeholder="Ej. 3245306949">
        </div>

        <div class="input-group">
            <label>Total a enviar</label>
            <input type="number" id="totalEnviar" placeholder="Ej. 50000">
        </div>

        <div id="previewBox" class="preview-box">
            <p>Nombre: <span id="vNombre">-</span></p>
            <p>Correo: <span id="vCorreo">-</span></p>
            <p>Doc: <span id="vDoc">-</span></p>
        </div>

        <button type="button" id="btnExtraer" class="btn-purple">Extraer nombre del número</button>
        <button type="button" id="btnGenerar" class="btn-pink">Generar Comprobante</button>
    </div>

    <div id="receiptCard" class="receipt-card">
        <div class="check-box">
            <div class="check-circle">
                <svg viewBox="0 0 24 24">
                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                </svg>
            </div>
        </div>
        <div class="receipt-msg">¡Listo! Enviaste</div>
        <div id="montoFinal" class="receipt-val">$ 235.688</div>

        <div class="dashed-line"></div>

        <div class="info-item">
            <div class="info-label">A:</div>
            <div id="resNombre" class="info-value">MARILYN BENITEZ ARRIETA</div>
        </div>

        <div class="info-item">
            <div class="info-label">Número celular:</div>
            <div id="resCelular" class="info-value">3247473132</div>
        </div>

        <div class="info-item">
            <div class="info-label">Fecha:</div>
            <div id="resFecha" class="info-value">22/6/2026</div>
        </div>

        <div class="info-item">
            <div class="info-label">Hora:</div>
            <div id="resHora" class="info-value">03:45 p. m.</div>
        </div>

        <div class="info-item">
            <div class="info-label">Referencia:</div>
            <div id="resRef" class="info-value">M878045</div>
        </div>

        <button type="button" id="btnRecargar" class="btn-create-other">Crear otro comprobante</button>
    </div>

</div>

<script>
    // Base de datos de prueba
    const usuariosLocales = {
        "3245306949": {
            nombre: "MARILYN BENITEZ ARRIETA",
            correo: "marilyn.benitez@gmail.com",
            documento: "CC 1.003.456.789"
        },
        "3247473132": {
            nombre: "JUAN CARLOS PÉREZ",
            correo: "juan.perez2026@outlook.com",
            documento: "CC 1.012.345.678"
        }
    };

    let datosActivos = null;

    // Acción extraer
    document.getElementById('btnExtraer').addEventListener('click', function() {
        const num = document.getElementById('numeroDestino').value.trim();
        if(!num) { alert("Socio, meta un número."); return; }

        this.innerText = "Extrayendo...";
        
        setTimeout(() => {
            const data = usuariosLocales[num];
            if(data) {
                datosActivos = data;
                document.getElementById('vNombre').innerText = data.nombre;
                document.getElementById('vCorreo').innerText = data.correo;
                document.getElementById('vDoc').innerText = data.documento;
                document.getElementById('previewBox').style.display = "block";
            } else {
                datosActivos = null;
                alert("No encontrado. Intente con: 3245306949");
            }
            this.innerText = "Extraer nombre del número";
        }, 1000);
    });

    // Acción generar
    document.getElementById('btnGenerar').addEventListener('click', function() {
        const num = document.getElementById('numeroDestino').value.trim();
        const plata = document.getElementById('totalEnviar').value.trim();

        if(!num || !plata || !datosActivos) {
            alert("Falta rellenar los datos o extraer la información del número, ñero.");
            return;
        }

        // Conversión limpia a dinero de Colombia ($ 50.000)
        const plataFormato = new Intl.NumberFormat('es-CO', {
            style: 'currency', currency: 'COP', minimumFractionDigits: 0
        }).format(plata).replace("COP", "$");

        // Tiempos reales actuales
        const d = new Date();
        const fStr = `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
        let h = d.getHours();
        const m = d.getMinutes().toString().padStart(2, '0');
        const ampm = h >= 12 ? 'p. m.' : 'a. m.';
        h = h % 12; h = h ? h : 12;
        const hStr = `${h.toString().padStart(2,'0')}:${m} ${ampm}`;

        // Llenar la tarjeta blanca
        document.getElementById('montoFinal').innerText = plataFormato;
        document.getElementById('resNombre').innerText = datosActivos.nombre;
        document.getElementById('resCelular').innerText = num;
        document.getElementById('resFecha').innerText = fStr;
        document.getElementById('resHora').innerText = hStr;
        document.getElementById('resRef').innerText = "M" + Math.floor(100000 + Math.random() * 900000);

        // Suichear pantallas
        document.getElementById('formPanel').style.display = "none";
        document.getElementById('receiptCard').style.display = "block";
    });

    // Acción regresar
    document.getElementById('btnRecargar').addEventListener('click', function() {
        document.getElementById('numeroDestino').value = "";
        document.getElementById('totalEnviar').value = "";
        document.getElementById('previewBox').style.display = "none";
        datosActivos = null;
        
        document.getElementById('receiptCard').style.display = "none";
        document.getElementById('formPanel').style.display = "block";
    });
</script>

</body>
</html>
