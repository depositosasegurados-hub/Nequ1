<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NequiDz-V3 - Comprobante Rápido</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0d0117;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .phone-container {
            width: 100%;
            max-width: 390px;
            background-color: #0d0117;
            min-height: 740px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* --- PANTALLA PRINCIPAL (FORMULARIO) --- */
        .form-panel {
            width: 90%;
            background-color: #1a082e;
            border: 2px solid #32145a;
            border-radius: 24px;
            padding: 30px 20px;
            box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.5);
            display: block;
        }

        .title-main {
            color: #da0075;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 5px;
        }

        .subtitle-main {
            color: #a395b8;
            font-size: 14px;
            text-align: center;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: #a395b8;
            font-size: 14px;
            margin-bottom: 8px;
            padding-left: 5px;
        }

        .input-group input {
            width: 100%;
            background-color: #250f3e;
            border: 1px solid #441e6e;
            border-radius: 12px;
            padding: 15px;
            color: #ffffff;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }

        .input-group input:focus {
            border-color: #da0075;
        }

        .input-group input::placeholder {
            color: #5c4777;
        }

        /* --- BOTONES --- */
        .btn-purple {
            width: 100%;
            background-color: #4c1d95;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            transition: background-color 0.2s;
        }

        .btn-purple:active {
            background-color: #3b1675;
        }

        .btn-purple:disabled {
            background-color: #2b1155;
            color: #73628a;
            cursor: not-allowed;
        }

        .btn-pink {
            width: 100%;
            background-color: #da0075;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-pink:active {
            background-color: #b50061;
        }

        /* --- PANTALLA RESULTADO (COMPROBANTE BLANCO) --- */
        .receipt-panel {
            width: 92%;
            background-color: #ffffff;
            border-radius: 28px;
            padding: 25px;
            color: #333333;
            box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.6);
            display: none; /* Oculto inicialmente */
            animation: fadeInUp 0.4s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-check-container {
            text-align: center;
            margin-top: 10px;
            margin-bottom: 15px;
        }

        .icon-check {
            width: 50px;
            height: 50px;
            background-color: #e2f7ed;
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            color: #00b15e;
            font-size: 24px;
            font-weight: bold;
        }

        .receipt-status {
            text-align: center;
            color: #333333;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .receipt-amount {
            text-align: center;
            color: #111111;
            font-size: 34px;
            font-weight: 700;
            margin-bottom: 25px;
        }

        .divider {
            border-top: 1px dashed #cccccc;
            margin-bottom: 20px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 14px;
            font-size: 14px;
        }

        .data-label {
            color: #777777;
            width: 35%;
        }

        .data-value {
            color: #222222;
            font-weight: 500;
            text-align: right;
            width: 65%;
            word-wrap: break-word;
        }

        .btn-back {
            width: 100%;
            background-color: #333333;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
        }

        /* --- LOADER/NOTIFICACIÓN INTERNA DE EXTRACCIÓN --- */
        .info-preview {
            background-color: #22113a;
            border-left: 4px solid #da0075;
            padding: 12px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 20px;
            font-size: 13px;
            display: none; /* Se muestra al extraer */
        }
        .info-preview p {
            margin-bottom: 4px;
        }
        .info-preview p span {
            color: #da0075;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="phone-container">

    <div id="formPanel" class="form-panel">
        <div class="title-main">NequiDz-V3</div>
        <div class="subtitle-main">Comprobante Rápido</div>

        <div class="input-group">
            <label for="numeroDestino">Número destino</label>
            <input type="number" id="numeroDestino" placeholder="Ej. 3245306949" oninput="javascript: if (this.value.length > this.maxLength) this.value = this.value.slice(0, this.maxLength);" maxLength="10">
        </div>

        <div class="input-group">
            <label for="totalEnviar">Total a enviar</label>
            <input type="number" id="totalEnviar" placeholder="Ej. 50000">
        </div>

        <div id="infoPreview" class="info-preview">
            <p><strong>Titular:</strong> <span id="prevNombre">-</span></p>
            <p><strong>Correo:</strong> <span id="prevCorreo">-</span></p>
            <p><strong>Documento:</strong> <span id="prevDoc">-</span></p>
        </div>

        <button type="button" id="btnExtraer" class="btn-purple">Extraer nombre del número</button>
        <button type="button" id="btnGenerar" class="btn-pink">Generar Comprobante</button>
    </div>

    <div id="receiptPanel" class="receipt-panel">
        <div class="icon-check-container">
            <div class="icon-check">✓</div>
        </div>
        <div class="receipt-status">¡Listo! Enviaste</div>
        <div id="recMonto" class="receipt-amount">$ 0</div>

        <div class="divider"></div>

        <div class="data-row">
            <div class="data-label">A:</div>
            <div id="recNombre" class="data-value">-</div>
        </div>
        <div class="data-row">
            <div class="data-label">Número celular:</div>
            <div id="recCelular" class="data-value">-</div>
        </div>
        <div class="data-row">
            <div class="data-label">Fecha:</div>
            <div id="recFecha" class="data-value">-</div>
        </div>
        <div class="data-row">
            <div class="data-label">Hora:</div>
            <div id="recHora" class="data-value">-</div>
        </div>
        <div class="data-row">
            <div class="data-label">Referencia:</div>
            <div id="recReferencia" class="data-value">-</div>
        </div>
        <div class="data-row">
            <div class="data-label">Correo:</div>
            <div id="recCorreo" class="data-value" style="font-size: 12px; color: #666;">-</div>
        </div>
        <div class="data-row">
            <div class="data-label">Documento:</div>
            <div id="recDoc" class="data-value" style="font-size: 12px; color: #666;">-</div>
        </div>

        <button type="button" id="btnRegresar" class="btn-back">Crear otro comprobante</button>
    </div>

</div>

<script>
    // 1. BASE DE DATOS LOCAL SIMULADA
    const baseDatosUsuarios = {
        "3245306949": {
            nombre: "MARILYN BENITEZ ARRIETA",
            correo: "marilyn.benitez@gmail.com",
            documento: "CC 1.003.456.789"
        },
        "3247473132": {
            nombre: "JUAN CARLOS PÉREZ",
            correo: "juan.perez2026@outlook.com",
            documento: "CC 1.012.345.678"
        }
    };

    // Variable global temporal para guardar la consulta activa
    let usuarioExtraido = null;

    // 2. LÓGICA DEL BOTÓN EXTRAER
    document.getElementById('btnExtraer').addEventListener('click', function() {
        const celular = document.getElementById('numeroDestino').value.trim();
        const btn = this;

        if (celular.length !== 10) {
            alert("Socio, ponga un número de celular válido (10 dígitos).");
            return;
        }

        // Simulación de carga en tiempo real cambiando el texto
        btn.innerText = "Extrayendo...";
        btn.disabled = true;
        document.getElementById('infoPreview').style.display = "none";

        setTimeout(() => {
            const usuario = baseDatosUsuarios[celular];

            if (usuario) {
                usuarioExtraido = usuario; // Guardamos los datos
                
                // Pintamos los datos en el bloque de vista previa
                document.getElementById('prevNombre').innerText = usuario.nombre;
                document.getElementById('prevCorreo').innerText = usuario.correo;
                document.getElementById('prevDoc').innerText = usuario.documento;
                
                // Mostramos el bloque en la interfaz
                document.getElementById('infoPreview').style.display = "block";
            } else {
                usuarioExtraido = null;
                alert("Número no registrado. Para probar use: 3245306949 o 3247473132");
            }

            // Restauramos el botón
            btn.innerText = "Extraer nombre del número";
            btn.disabled = false;
        }, 1300); // 1.3 segundos de retraso para que se vea real
    });

    // 3. LÓGICA DE GENERAR COMPROBANTE
    document.getElementById('btnGenerar').addEventListener('click', function() {
        const celular = document.getElementById('numeroDestino').value.trim();
        const monto = document.getElementById('totalEnviar').value.trim();

        if (!celular || !monto) {
            alert("Llene todos los campos primero, ñero.");
            return;
        }

        if (!usuarioExtraido) {
            alert("Primero tiene que darle al botón morado para extraer los datos del propietario.");
            return;
        }

        // Formatear el dinero como $ 235.688
        const montoFormateado = new Intl.NumberFormat('es-CO', {
            style: 'currency',
            currency: 'COP',
            minimumFractionDigits: 0
        }).format(monto).replace("COP", "$");

        // Obtener fecha y hora en tiempo real local
        const ahora = new Date();
        const fechaStr = `${ahora.getDate()}/${ahora.getMonth() + 1}/${ahora.getFullYear()}`;
        
        let horas = ahora.getHours();
        const minutos = ahora.getMinutes().toString().padStart(2, '0');
        const ampm = horas >= 12 ? 'p. m.' : 'a. m.';
        horas = horas % 12;
        horas = horas ? horas : 12; // Formato 12 horas
        const horaStr = `${horas.toString().padStart(2, '0')}:${minutos} ${ampm}`;

        // Generar un código de referencia aleatorio estilo Nequi (Ej: M878045)
        const refAleatoria = "M" + Math.floor(100000 + Math.random() * 900000);

        // Inyectar datos al comprobante blanco
        document.getElementById('recMonto').innerText = montoFormateado;
        document.getElementById('recNombre').innerText = usuarioExtraido.nombre;
        document.getElementById('recCelular').innerText = celular;
        document.getElementById('recFecha').innerText = fechaStr;
        document.getElementById('recHora').innerText = horaStr;
        document.getElementById('recReferencia').innerText = refAleatoria;
        document.getElementById('recCorreo').innerText = usuarioExtraido.correo;
        document.getElementById('recDoc').innerText = usuarioExtraido.documento;

        // Intercambiar pantallas
        document.getElementById('formPanel').style.display = "none";
        document.getElementById('receiptPanel').style.display = "block";
    });

    // 4. BOTÓN REINICIAR (CREAR OTRO)
    document.getElementById('btnRegresar').addEventListener('click', function() {
        // Limpiar campos
        document.getElementById('numeroDestino').value = "";
        document.getElementById('totalEnviar').value = "";
        document.getElementById('infoPreview').style.display = "none";
        usuarioExtraido = null;

        // Volver al formulario
        document.getElementById('receiptPanel').style.display = "none";
        document.getElementById('formPanel').style.display = "block";
    });
</script>

</body>
</html>
