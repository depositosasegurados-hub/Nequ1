<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NequiDz-V3 - Comprobante Rápido</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0d0118;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .phone-container {
            width: 100%;
            max-width: 380px;
            background: #1d072b;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
            overflow: hidden;
            border: 4px solid #2d0d42;
            padding: 25px;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 24px;
            color: #ff007f;
            font-weight: bold;
        }

        .header p {
            font-size: 12px;
            color: #b3a2be;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #d1c4db;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: #2a0f3d;
            border: 1px solid #4a1f6d;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border 0.3s;
        }

        .form-group input:focus {
            border-color: #ff007f;
        }

        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            margin-bottom: 12px;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-extract {
            background: #4a1f6d;
            color: #fff;
            border: 1px solid #7b33b3;
        }

        .btn-extract:hover {
            background: #5c2787;
        }

        .btn-generate {
            background: #ff007f;
            color: #fff;
            margin-top: 10px;
        }

        .btn-generate:hover {
            background: #e60073;
        }

        .loading-text {
            text-align: center;
            color: #ff007f;
            font-size: 14px;
            font-style: italic;
            margin: 10px 0;
            display: none;
        }

        .name-result {
            background: #004d26;
            color: #1aff8c;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            border: 1px solid #008040;
            display: none;
            margin-bottom: 15px;
        }

        /* Vista del Comprobante Final */
        .receipt-container {
            display: none;
            background: #fff;
            color: #333;
            border-radius: 20px;
            padding: 20px;
            margin-top: 5px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .receipt-success-icon {
            width: 50px;
            height: 50px;
            background: #e6f9f0;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px auto;
            color: #00b359;
            font-size: 24px;
            font-weight: bold;
        }

        .receipt-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }

        .receipt-amount {
            font-size: 28px;
            font-weight: bold;
            color: #111;
            margin-bottom: 20px;
        }

        .receipt-details {
            border-top: 1px dashed #ccc;
            padding-top: 15px;
            text-align: left;
        }

        .receipt-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 13px;
        }

        .receipt-label {
            color: #777;
        }

        .receipt-value {
            font-weight: 600;
            color: #222;
        }

        .btn-back {
            background: #333;
            color: #fff;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="phone-container" id="formView">
    <div class="header">
        <h1>NequiDz-V3</h1>
        <p>Comprobante Rápido</p>
    </div>

    <div class="form-group">
        <label for="phone">Número destino</label>
        <input type="tel" id="phone" placeholder="Ej. 3245306949" maxlength="10">
    </div>

    <div class="form-group">
        <label for="amount">Total a enviar</label>
        <input type="number" id="amount" placeholder="Ej. 50000">
    </div>

    <button class="btn btn-extract" id="btnExtract" onclick="extractName()">Extraer nombre del número</button>
    
    <div class="loading-text" id="loadingText">Extrayendo...</div>
    <div class="name-result" id="nameResult">MARILYN BENITEZ ARRIETA</div>

    <button class="btn btn-generate" id="btnGenerate" onclick="generateReceipt()">Generar Comprobante</button>
</div>

<div class="phone-container" id="receiptView" style="display: none; background: #f3f4f6;">
    <div class="receipt-container">
        <div class="receipt-success-icon">✓</div>
        <div class="receipt-title">¡Listo! Enviaste</div>
        <div class="receipt-amount" id="rAmount">$0.00</div>
        
        <div class="receipt-details">
            <div class="receipt-row">
                <span class="receipt-label">A:</span>
                <span class="receipt-value" id="rName">Nombre</span>
            </div>
            <div class="receipt-row">
                <span class="receipt-label">Número celular:</span>
                <span class="receipt-value" id="rPhone">0000000000</span>
            </div>
            <div class="receipt-row">
                <span class="receipt-label">Fecha:</span>
                <span class="receipt-value" id="rDate">00/00/0000</span>
            </div>
            <div class="receipt-row">
                <span class="receipt-label">Hora:</span>
                <span class="receipt-value" id="rTime">00:00</span>
            </div>
            <div class="receipt-row">
                <span class="receipt-label">Referencia:</span>
                <span class="receipt-value" id="rRef">M123456</span>
            </div>
        </div>
    </div>
    <button class="btn btn-back" onclick="showForm()">Crear otro comprobante</button>
</div>

<script>
    function extractName() {
        const phone = document.getElementById('phone').value;
        if (phone.trim() === "") {
            alert("Por favor, ingresa primero un número destino.");
            return;
        }

        // Oculta el botón y simula la carga
        document.getElementById('btnExtract').style.display = 'none';
        document.getElementById('loadingText').style.display = 'block';

        // Demora de 1.5 segundos idéntica al flujo de la imagen
        setTimeout(() => {
            document.getElementById('loadingText').style.display = 'none';
            document.getElementById('nameResult').style.display = 'block';
        }, 1500); 
    }

    function generateReceipt() {
        const phone = document.getElementById('phone').value;
        const amount = document.getElementById('amount').value;

        if (phone.trim() === "" || amount.trim() === "") {
            alert("Por favor completa todos los campos.");
            return;
        }

        const name = "MARILYN BENITEZ ARRIETA";

        // Formato de moneda local (Pesos Colombianos)
        const formattedAmount = new Intl.NumberFormat('es-CO', {
            style: 'currency',
            currency: 'COP',
            minimumFractionDigits: 0
        }).format(amount);

        // Captura de fecha y hora real del sistema de forma automática
        const now = new Date();
        const dateStr = now.toLocaleDateString('es-CO');
        const timeStr = now.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
        
        // Número de referencia aleatorio autogenerado con patrón 'M'
        const randomRef = "M" + Math.floor(100000 + Math.random() * 900000);

        // Inserta los valores dinámicos en la tarjeta del comprobante
        document.getElementById('rAmount').innerText = formattedAmount;
        document.getElementById('rName').innerText = name;
        document.getElementById('rPhone').innerText = phone;
        document.getElementById('rDate').innerText = dateStr;
        document.getElementById('rTime').innerText = timeStr;
        document.getElementById('rRef').innerText = randomRef;

        // Hace el cambio visual de pantallas
        document.getElementById('formView').style.display = 'none';
        document.getElementById('receiptView').style.display = 'block';
        document.querySelector('.receipt-container').style.display = 'block';
    }

    function showForm() {
        // Resetea el estado completo de los campos para un nuevo uso
        document.getElementById('phone').value = "";
        document.getElementById('amount').value = "";
        document.getElementById('nameResult').style.display = 'none';
        document.getElementById('btnExtract').style.display = 'block';
        
        // Regresa a la pantalla principal
        document.getElementById('receiptView').style.display = 'none';
        document.getElementById('formView').style.display = 'block';
    }
</script>

</body>
</html>
