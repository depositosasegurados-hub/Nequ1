<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NequiDz-V3 - Pro</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0b0014;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Contenedor idéntico a la pantalla de un celular moderno */
        .phone-container {
            width: 100%;
            max-width: 412px;
            height: 100vh;
            min-height: 740px;
            background-color: #0b0014;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-y: auto;
            padding: 20px 16px;
        }

        /* --- PANTALLA 1: FORMULARIO DE ENTRADA (ESTILO NEQUI) --- */
        .form-panel {
            width: 100%;
            background-color: #16002c;
            border-radius: 24px;
            padding: 28px 20px;
            box-shadow: 0px 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid #2e1050;
            display: block;
            margin: auto 0;
        }

        .title-main {
            color: #da0075;
            font-size: 30px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 2px;
            letter-spacing: -0.5px;
        }

        .subtitle-main {
            color: #8f7fa6;
            font-size: 13px;
            text-align: center;
            margin-bottom: 28px;
            font-weight: 500;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            padding-left: 2px;
        }

        .input-group input {
            width: 100%;
            background-color: #240a3e;
            border: 1px solid #411e6d;
            border-radius: 12px;
            padding: 16px;
            color: #ffffff;
            font-size: 16px;
            outline: none;
            transition: all 0.2s ease;
        }

        .input-group input:focus {
            border-color: #da0075;
            box-shadow: 0 0 8px rgba(218, 0, 117, 0.3);
        }

        .input-group input::placeholder {
            color: #5d4679;
        }

        /* Botón Extraer (Morado) */
        .btn-purple {
            width: 100%;
            background-color: #3b1464;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
            transition: background 0.2s;
        }

        .btn-purple:active { background-color: #2c0e4c; }

        /* Botón Generar (Rosado Fucsia Nequi) */
        .btn-pink {
            width: 100%;
            background-color: #e00073;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-pink:active { background-color: #b8005f; }

        /* --- PANTALLA 2: COMPROBANTE TOTALMENTE CALCADO --- */
        .receipt-card {
            width: 100%;
            background-color: #ffffff;
            border-radius: 32px;
            padding: 32px 24px 24px 24px;
            color: #222222;
            box-shadow: 0px 12px 36px rgba(0, 0, 0, 0.6);
            display: none; /* Se activa dinámicamente */
            margin: auto 0;
            animation: popUp 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popUp {
            from { transform: scale(0.92); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .check-box {
            text-align: center;
            margin-bottom: 16px;
        }

        .check-circle {
            width: 56px;
            height: 56px;
            background-color: #e2f7ed;
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }

        .check-circle svg {
            width: 26px;
            height: 26px;
            fill: #00b15e;
        }

        .receipt-msg {
            text-align: center;
            font-size: 15px;
            color: #444444;
            font-weight: 400;
            margin-bottom: 6px;
        }

        .receipt-val {
            text-align: center;
            font-size: 38px;
            font-weight: 700;
            color: #111111;
            margin-bottom: 28px;
            letter-spacing: -0.8px;
        }

        .dashed-line {
            border-top: 1px dashed #dddddd;
            margin-bottom: 24px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 18px;
            font-size: 14px;
            line-height: 1.4;
        }

        .info-label {
            color: #828282;
            width: 38%;
            font-weight: 400;
        }

        .info-value {
            color: #1c1c1c;
            font-weight: 500;
            text-align: right;
            width: 62%;
            word-wrap: break-word;
        }

        /* Botón Inferior Gris Oscuro exacto */
        .btn-create-other {
            width: 100%;
            background-color: #333333;
            color: #ffffff;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            transition: background 0.2s;
        }

        .btn-create-other:active { background-color: #222222; }

        /* Panel interno de previsualización al extraer datos */
        .preview-box {
            background-color: #210839;
            border-left: 4px solid #e00073;
            padding: 12px 14px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }
        .preview-box p { margin-bottom: 4px; color: #a899c2; }
        .preview-box span { color: #ffffff; font-weight: 600; }
    </style>
</head>
<body>

<div class="phone-container">

    <div id="formPanel" class="form-panel">
        <div class="title-main">NequiDz-V3</div>
        <div class="subtitle-main">Comprobante Rápido</div>

        <div class="input-group">
            <label>Número destino</label>
            <input type="number" id="numeroDestino" placeholder="Ej. 3245306949">
        </div>

        <div class="input-group">
            <label>Total a enviar</label>
            <input type="number" id="totalEnviar" placeholder="Ej. 50000">
        </div>

        <div id="previewBox" class="preview-box">
            <p>Titular: <span id="vNombre">-</span></p>
            <p>Correo: <span id="vCorreo">-</span></p>
            <p>Documento: <span id="vDoc">-</span></p>
        </div>

        <button type="button" id="btnExtraer" class="btn-purple">Extraer nombre del número</button>
        <button type="button" id="btnGenerar" class="btn-pink">Generar Comprobante</button>
    </div>

    <div id="receiptCard" class="receipt-card">
        <div class="check-box">
            <div class="check-circle">
                <svg viewBox="0 0 24 24">
                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                </svg>
            </div>
        </div>
        <div class="receipt-msg">¡Listo! Enviaste</div>
        <div id="montoFinal" class="receipt-val">$ 0</div>

        <div class="dashed-line"></div>

        <div class="info-item">
            <div class="info-label">A:</div>
            <div id="resNombre" class="info-value">-</div>
        </div>

        <div class="info-item">
            <div class="info-label">Número celular:</div>
            <div id="resCelular" class="info-value">-</div>
        </div>

        <div class="info-item">
            <div class="info-label">Fecha:</div>
            <div id="resFecha" class="info-value">-</div>
        </div>

        <div class="info-item">
            <div class="info-label">Hora:</div>
            <div id="resHora" class="info-value">-</div>
        </div>

        <div class="info-item">
            <div class="info-label">Referencia:</div>
            <div id="resRef" class="info-value">-</div>
        </div>

        <button type="button" id="btnRecargar" class="btn-create-other">Crear otro comprobante</button>
    </div>

</div>

<script>
    // Base de datos local para la simulación
    const usuariosLocales = {
        "3245306949": {
            nombre: "MARILYN BENITEZ ARRIETA",
            correo: "marilyn.benitez@gmail.com",
            documento: "CC 1.003.456.789"
        },
        "3247473132": {
            nombre: "JUAN CARLOS PÉREZ",
            correo: "juan.perez2026@outlook.com",
            documento: "CC 1.012.345.678"
        }
    };

    let datosActivos = null;

    // Lógica botón Extraer
    document.getElementById('btnExtraer').addEventListener('click', function() {
        const num = document.getElementById('numeroDestino').value.trim();
        if(!num) { alert("Socio, ingrese un número primero."); return; }

        this.innerText = "Extrayendo...";
        this.disabled = true;
        
        setTimeout(() => {
            const data = usuariosLocales[num];
            if(data) {
                datosActivos = data;
                document.getElementById('vNombre').innerText = data.nombre;
                document.getElementById('vCorreo').innerText = data.correo;
                document.getElementById('vDoc').innerText = data.documento;
                document.getElementById('previewBox').style.display = "block";
            } else {
                datosActivos = null;
                alert("Número no encontrado. Use de prueba: 3245306949");
            }
            this.innerText = "Extraer nombre del número";
            this.disabled = false;
        }, 1100);
    });

    // Lógica botón Generar Comprobante
    document.getElementById('btnGenerar').addEventListener('click', function() {
        const num = document.getElementById('numeroDestino').value.trim();
        const plata = document.getElementById('totalEnviar').value.trim();

        if(!num || !plata) {
            alert("Socio, llene los campos primero.");
            return;
        }

        if(!datosActivos) {
            alert("Debe extraer el nombre del número antes de generar el comprobante.");
            return;
        }

        // Formato de moneda COP ($ 235.688)
        const plataFormato = new Intl.NumberFormat('es-CO', {
            style: 'currency', currency: 'COP', minimumFractionDigits: 0
        }).format(plata).replace("COP", "$");

        // Datos de tiempo automáticos
        const d = new Date();
        const fStr = `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
        let h = d.getHours();
        const m = d.getMinutes().toString().padStart(2, '0');
        const ampm = h >= 12 ? 'p. m.' : 'a. m.';
        h = h % 12; h = h ? h : 12;
        const hStr = `${h.toString().padStart(2,'0')}:${m} ${ampm}`;

        // Inyección de variables reales en la tarjeta blanca
        document.getElementById('montoFinal').innerText = plataFormato;
        document.getElementById('resNombre').innerText = datosActivos.nombre;
        document.getElementById('resCelular').innerText = num;
        document.getElementById('resFecha').innerText = fStr;
        document.getElementById('resHora').innerText = hStr;
        document.getElementById('resRef').innerText = "M" + Math.floor(100000 + Math.random() * 900000);

        // Ocultar formulario, mostrar comprobante
        document.getElementById('formPanel').style.display = "none";
        document.getElementById('receiptCard').style.display = "block";
    });

    // Botón reiniciar formulario
    document.getElementById('btnRecargar').addEventListener('click', function() {
        document.getElementById('numeroDestino').value = "";
        document.getElementById('totalEnviar').value = "";
        document.getElementById('previewBox').style.display = "none";
        datosActivos = null;
        
        document.getElementById('receiptCard').style.display = "none";
        document.getElementById('formPanel').style.display = "block";
    });
</script>

</body>
</html>
