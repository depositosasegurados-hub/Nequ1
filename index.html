<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZavuDash - Gestión de Envíos</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0a0104;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-container {
            width: 100%;
            max-width: 412px;
            height: 100vh;
            min-height: 720px;
            background-color: #0a0104;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-y: auto;
            padding: 24px 16px;
        }

        /* --- PANEL PRINCIPAL: ROJO Y NEGRO --- */
        .form-panel {
            width: 100%;
            background-color: #160207;
            border-radius: 28px;
            padding: 32px 24px;
            box-shadow: 0px 10px 35px rgba(0, 0, 0, 0.6);
            border: 1px solid #360b14;
            margin: auto 0;
            display: block;
        }

        .title-main {
            color: #ff1e46;
            font-size: 28px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        .subtitle-main {
            color: #a89498;
            font-size: 13px;
            text-align: center;
            margin-bottom: 32px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .input-group input {
            width: 100%;
            background-color: #24050c;
            border: 1px solid #4a121e;
            border-radius: 14px;
            padding: 16px;
            color: #ffffff;
            font-size: 16px;
            outline: none;
            transition: all 0.2s ease;
        }

        .input-group input:focus {
            border-color: #ff1e46;
            box-shadow: 0 0 10px rgba(255, 30, 70, 0.25);
        }

        .input-group input::placeholder {
            color: #694b51;
        }

        /* Botones del Sistema */
        .btn-dark {
            width: 100%;
            background-color: #380b14;
            color: #ffffff;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 14px;
            transition: background 0.2s;
        }

        .btn-dark:active { background-color: #24050a; }

        .btn-red {
            width: 100%;
            background-color: #ff1e46;
            color: #ffffff;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-red:active { background-color: #d60d31; }

        /* --- PANEL DE RESULTADO / COMPROBANTE --- */
        .receipt-card {
            width: 100%;
            background-color: #ffffff;
            border-radius: 32px;
            padding: 32px 24px 24px 24px;
            color: #1a1a1a;
            box-shadow: 0px 15px 40px rgba(0, 0, 0, 0.7);
            display: none;
            margin: auto 0;
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .status-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .status-icon {
            width: 52px;
            height: 52px;
            background-color: #ffe8ec;
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 12px;
        }

        .status-icon svg {
            width: 26px;
            height: 26px;
            fill: #ff1e46;
        }

        .status-title {
            font-size: 15px;
            color: #666666;
            font-weight: 400;
        }

        .status-amount {
            font-size: 36px;
            font-weight: 700;
            color: #000000;
            letter-spacing: -0.5px;
            margin-top: 4px;
        }

        .divider {
            border-top: 1px dashed #e0e0e0;
            margin-bottom: 24px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .info-label {
            color: #7a7a7a;
            width: 40%;
        }

        .info-value {
            color: #111111;
            font-weight: 600;
            text-align: right;
            width: 60%;
        }

        .btn-reset {
            width: 100%;
            background-color: #1a1a1a;
            color: #ffffff;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 24px;
        }

        /* Caja de visualización interna */
        .preview-box {
            background-color: #290811;
            border-left: 4px solid #ff1e46;
            padding: 14px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }
        .preview-box p { margin-bottom: 4px; color: #c4b0b4; }
        .preview-box span { color: #ffffff; font-weight: 600; }
    </style>
</head>
<body>

<div class="phone-container">

    <div id="formPanel" class="form-panel">
        <div class="title-main">ZavuDash</div>
        <div class="subtitle-main">Panel de Verificación Rápida</div>

        <div class="input-group">
            <label>ID o Número de Destino</label>
            <input type="number" id="numeroDestino" placeholder="Ej. 3245306949">
        </div>

        <div class="input-group">
            <label>Monto del Registro</label>
            <input type="number" id="totalEnviar" placeholder="Ej. 50000">
        </div>

        <div id="previewBox" class="preview-box">
            <p>Titular asignado: <span id="vNombre">-</span></p>
            <p>Canal de Correo: <span id="vCorreo">-</span></p>
            <p>Identificación: <span id="vDoc">-</span></p>
        </div>

        <button type="button" id="btnExtraer" class="btn-dark">Extraer información de base de datos</button>
        <button type="button" id="btnGenerar" class="btn-red">Generar Registro</button>
    </div>

    <div id="receiptCard" class="receipt-card">
        <div class="status-header">
            <div class="status-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                </svg>
            </div>
            <div class="status-title">Transacción Procesada</div>
            <div id="montoFinal" class="status-amount">$ 0</div>
        </div>

        <div class="divider"></div>

        <div class="info-row">
            <div class="info-label">Asignado a:</div>
            <div id="resNombre" class="info-value">-</div>
        </div>

        <div class="info-row">
            <div class="info-label">Contacto:</div>
            <div id="resCelular" class="info-value">-</div>
        </div>

        <div class="info-row">
            <div class="info-label">Fecha de Registro:</div>
            <div id="resFecha" class="info-value">-</div>
        </div>

        <div class="info-row">
            <div class="info-label">Hora Local:</div>
            <div id="resHora" class="info-value">-</div>
        </div>

        <div class="info-row">
            <div class="info-label">Código Hash Ref:</div>
            <div id="resRef" class="info-value">-</div>
        </div>

        <button type="button" id="btnRecargar" class="btn-reset">Procesar nuevo registro</button>
    </div>

</div>

<script>
    // Simulación interna de base de datos
    const usuariosLocales = {
        "3245306949": {
            nombre: "MARILYN BENITEZ ARRIETA",
            correo: "marilyn.benitez@gmail.com",
            documento: "CC 1.003.456.789"
        },
        "3247473132": {
            nombre: "JUAN CARLOS PÉREZ",
            correo: "juan.perez2026@outlook.com",
            documento: "CC 1.012.345.678"
        }
    };

    let datosActivos = null;

    // Acción Extraer Datos
    document.getElementById('btnExtraer').addEventListener('click', function() {
        const num = document.getElementById('numeroDestino').value.trim();
        if(!num) { alert("Socio, ingrese un ID o número primero."); return; }

        this.innerText = "Consultando servidor local...";
        this.disabled = true;
        
        setTimeout(() => {
            const data = usuariosLocales[num];
            if(data) {
                datosActivos = data;
                document.getElementById('vNombre').innerText = data.nombre;
                document.getElementById('vCorreo').innerText = data.correo;
                document.getElementById('vDoc').innerText = data.documento;
                document.getElementById('previewBox').style.display = "block";
            } else {
                datosActivos = null;
                alert("ID no encontrado en la simulación. Pruebe con: 3245306949");
            }
            this.innerText = "Extraer información de base de datos";
            this.disabled = false;
        }, 1000);
    });

    // Acción Generar Comprobante
    document.getElementById('btnGenerar').addEventListener('click', function() {
        const num = document.getElementById('numeroDestino').value.trim();
        const plata = document.getElementById('totalEnviar').value.trim();

        if(!num || !plata) {
            alert("Por favor, complete todos los campos obligatorios.");
            return;
        }

        if(!datosActivos) {
            alert("Debe ejecutar la extracción de datos primero.");
            return;
        }

        // Formato numérico estándar de dinero
        const plataFormato = new Intl.NumberFormat('es-CO', {
            style: 'currency', currency: 'COP', minimumFractionDigits: 0
        }).format(plata).replace("COP", "$");

        // Cálculo de fechas dinámicas
        const d = new Date();
        const fStr = `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
        let h = d.getHours();
        const m = d.getMinutes().toString().padStart(2, '0');
        const ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12; h = h ? h : 12;
        const hStr = `${h.toString().padStart(2,'0')}:${m} ${ampm}`;

        // Inyectar datos en la tarjeta limpia
        document.getElementById('montoFinal').innerText = plataFormato;
        document.getElementById('resNombre').innerText = datosActivos.nombre;
        document.getElementById('resCelular').innerText = num;
        document.getElementById('resFecha').innerText = fStr;
        document.getElementById('resHora').innerText = hStr;
        document.getElementById('resRef').innerText = "ZV-" + Math.floor(100000 + Math.random() * 900000);

        // Cambiar vista de paneles
        document.getElementById('formPanel').style.display = "none";
        document.getElementById('receiptCard').style.display = "block";
    });

    // Acción Resetear
    document.getElementById('btnRecargar').addEventListener('click', function() {
        document.getElementById('numeroDestino').value = "";
        document.getElementById('totalEnviar').value = "";
        document.getElementById('previewBox').style.display = "none";
        datosActivos = null;
        
        document.getElementById('receiptCard').style.display = "none";
        document.getElementById('formPanel').style.display = "block";
    });
</script>

</body>
</html>
